name: Metrics
on:
  # 매일 00:00 UTC 자동 갱신
  schedule: [{ cron: "0 0 * * *" }]
  # Actions 탭에서 수동 실행 가능
  workflow_dispatch:
  # main 브랜치에 푸시될 때도 갱신
  push: { branches: ["main", "master"] }

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1) classic — 헤더/활동/커뮤니티/저장소/메타데이터 + 트래픽/Gists/라인수
      - name: Metrics (classic)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.classic.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: bimoraa
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Seoul
          plugin_traffic: yes
          plugin_gists: yes
          plugin_lines: yes

      # 2) isocalendar — 최근 1년 기여 캘린더 (3D)
      - name: Metrics (isocalendar full-year)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.isocalendar.fullyear.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: bimoraa
          base: ""
          config_timezone: Asia/Seoul
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # 3) languages — 가장 많이 사용한 언어
      - name: Metrics (most used languages)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: bimoraa
          base: ""
          # 본인 커밋만 집계하려면 아래 이메일을 git 커밋 이메일로 교체하세요
          commits_authoring: bimoraa, bimoraa@users.noreply.github.com
          plugin_languages: yes
          plugin_languages_limit: 12
          plugin_languages_threshold: 0%
          plugin_languages_colors: github
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_categories: markup, programming

      # 4) stars — 최근에 별 누른 저장소
      - name: Metrics (recently starred)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.stars.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: bimoraa
          base: ""
          plugin_stars: yes
          plugin_stars_limit: 3

      # 5) achievements — GitHub 업적
      - name: Metrics (achievements)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: bimoraa
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0
